<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Name Button - The Stanley Parable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            /* The unmistakable TSP Yellow */
            --page-bg: #FBD12E;
            --text-dark: #111111;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--page-bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* subtle noise texture for that slight retro feel */
            /* background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E"); */
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 2rem 1rem;
            box-sizing: border-box;
            flex: 1;
            /* Pushes footer down */
        }

        /* --- HEADER & LOGO --- */
        .logo-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 1rem;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            /* When I replace the image with an SVG, and if the SVG is black. */
            /* filter: drop-shadow(0px 4px 0px rgba(0, 0, 0, 0.1)); */
        }

        /* --- THE SPECIFIC TEXT REQUIREMENTS --- */
        .tagline {
            line-height: 1.25;
            padding: 6px 5px;
            font-family: 'League Gothic', sans-serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin: 0 0 3rem 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        /* --- THE BUTTON OBJECT --- */
        .button-wrapper {
            margin: 1rem 0 3rem 0;
            position: relative;
            /* Adds a massive, exaggerated spotlight behind the button */
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 60%);
            border-radius: 50%;
            padding: 2rem;
        }

        object.the-button {
            width: 250px;
            height: 250px;
            border: none;
            outline: none;
            background: transparent;
            display: block;
            /* Ensures the focus ring doesn't accidentally trigger on the wrapper itself */
            -webkit-tap-highlight-color: transparent;
        }

        /* --- INFOMERCIAL BANNER --- */
        .infomercial-banner {
            background-color: #E62E2D;
            /* Aggressive Red */
            color: #FFFFFF;
            font-family: 'Arial Black', Impact, sans-serif;
            text-transform: uppercase;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            padding: 15px 30px;
            border: 5px dashed #FFFFFF;
            box-shadow: 8px 8px 0px #111111;
            transform: rotate(-3deg);
            margin: 2rem 0;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .infomercial-banner span {
            color: #FFCC00;
            /* Highlight text inside the banner */
            display: block;
            font-size: 0.7em;
            letter-spacing: 3px;
        }

        /* --- FOOTER --- */
        footer {
            width: 100%;
            padding: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            box-sizing: border-box;
            border-top: 2px solid rgba(0, 0, 0, 0.1);
        }

        footer a {
            color: #111;
            font-weight: bold;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="main-container">

        <!-- Make sure to place your TSP:UD SVG logo file in the same directory -->
        <div class="logo-container">
            <img src="TSPUD.avif" alt="The Stanley Parable: Ultra Deluxe">
        </div>

        <!-- The exact text styling requested -->
        <h1 class="tagline">
            The button that says the name of the player that is playing the game™</span>
        </h1>

        <div class="button-wrapper">
            <!-- Importing the standalone SVG. The outline/border fix is applied in the CSS above. -->
            <object data="the-name-button.svg" type="image/svg+xml" class="the-button" aria-label="The Name Button" tabindex="0">
                <!-- Fallback text if the browser refuses to load the object -->
                The Name Button could not be loaded.
            </object>
        </div>

        <!-- The aggressive, QVC-style marketing sticker -->
        <div class="infomercial-banner">
            <span>Now fully ported to the</span>
            World Wide Web!
        </div>

    </div>

    <footer>
        <p>A completely unsanctioned, open-source web component.</p>
        <p>View the project on <a href="https://github.com/varungupta3009/The-Name-Button">GitHub</a>.</p>
    </footer>

</body>

</html>
